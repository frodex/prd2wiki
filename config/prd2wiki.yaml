# config/prd2wiki.yaml
server:
  addr: "0.0.0.0:8082"

data:
  dir: "./data"

embedder:
  endpoint: "http://localhost:8081"  # llama.cpp server (install via scripts/install-embedder.sh)
  dimensions: 768                    # nomic-embed-text-v1.5 full dimensions
  timeout: 30                        # seconds per request

projects:
  - default

logging:
  level: "info"
