# config/prd2wiki.yaml
server:
  addr: "0.0.0.0:8082"

data:
  dir: "./data"

tree:
  dir: "./tree"

librarian:
  socket: "/var/run/pippi-librarian.sock"

embedder:
  endpoint: "http://localhost:8088"  # TEI (text-embeddings-inference) ONNX server
  dimensions: 768                    # nomic-embed-text-v1.5 full dimensions
  timeout: 60s                       # per-batch timeout; large pages with many sections need 30-60s

logging:
  level: "info"
