{{define "content"}}
<h1>{{.Project}} — Pages</h1>
<table class="page-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Type</th>
            <th>Status</th>
            <th>Trust</th>
        </tr>
    </thead>
    <tbody>
        {{range .Content}}
        <tr>
            <td><a href="/projects/{{$.Project}}/pages/{{.ID}}">{{.ID}}</a></td>
            <td>{{.Title}}</td>
            <td><span class="badge badge-{{.Type}}">{{.Type}}</span></td>
            <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
            <td>L{{.TrustLevel}}</td>
        </tr>
        {{else}}
        <tr><td colspan="5">No pages yet. <a href="/projects/{{.Project}}/pages/new">Create one</a>.</td></tr>
        {{end}}
    </tbody>
</table>
{{end}}
