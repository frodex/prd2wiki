{{define "content"}}
<h1>{{.Project}} — Pages</h1>
<table class="page-table sortable" id="page-table">
    <thead>
        <tr>
            <th data-sort="text" class="sortable-th">Title <span class="sort-arrow"></span></th>
            <th data-sort="text" class="sortable-th">Type <span class="sort-arrow"></span></th>
            <th data-sort="text" class="sortable-th">Status <span class="sort-arrow"></span></th>
            <th data-sort="num" class="sortable-th">Trust <span class="sort-arrow"></span></th>
            <th data-sort="date" class="sortable-th">Last Edit <span class="sort-arrow"></span></th>
        </tr>
    </thead>
    <tbody>
        {{range .Content}}
        <tr>
            <td>
                <a href="/projects/{{$.Project}}/pages/{{.ID}}">{{.Title}}</a>
                <span class="page-id-annotation">{{.ID}}</span>
            </td>
            <td><span class="badge badge-{{.Type}}">{{.Type}}</span></td>
            <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
            <td>L{{.TrustLevel}}</td>
            <td class="last-edit-cell" data-sort-value="{{.LastEditDate}}">
                {{if .LastEditBy}}<span class="last-edit-by">{{.LastEditBy}}</span>{{end}}
                {{if .LastEditDate}}<span class="last-edit-date">{{.LastEditDate}}</span>{{end}}
            </td>
        </tr>
        {{else}}
        <tr><td colspan="5">No pages yet. <a href="/projects/{{.Project}}/pages/new">Create one</a>.</td></tr>
        {{end}}
    </tbody>
</table>
<script>
(function() {
    const table = document.getElementById('page-table');
    if (!table) return;
    const headers = table.querySelectorAll('th.sortable-th');
    let currentCol = -1;
    let ascending = true;

    headers.forEach((th, colIdx) => {
        th.style.cursor = 'pointer';
        th.addEventListener('click', () => {
            if (currentCol === colIdx) {
                ascending = !ascending;
            } else {
                currentCol = colIdx;
                ascending = true;
            }
            headers.forEach(h => h.querySelector('.sort-arrow').textContent = '');
            th.querySelector('.sort-arrow').textContent = ascending ? ' \u25B2' : ' \u25BC';

            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            const sortType = th.dataset.sort;

            rows.sort((a, b) => {
                const aEl = a.cells[colIdx];
                const bEl = b.cells[colIdx];
                const aCell = aEl?.dataset.sortValue || aEl?.textContent.trim() || '';
                const bCell = bEl?.dataset.sortValue || bEl?.textContent.trim() || '';
                let cmp = 0;
                if (sortType === 'num') {
                    cmp = parseFloat(aCell.replace(/[^\d.-]/g, '') || '0') - parseFloat(bCell.replace(/[^\d.-]/g, '') || '0');
                } else if (sortType === 'date') {
                    cmp = (aCell || '0').localeCompare(bCell || '0');
                } else {
                    cmp = aCell.localeCompare(bCell, undefined, { sensitivity: 'base' });
                }
                return ascending ? cmp : -cmp;
            });
            rows.forEach(r => tbody.appendChild(r));
        });
    });
})();
</script>
{{end}}
