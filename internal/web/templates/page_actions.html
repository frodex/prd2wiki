{{define "page-actions"}}
<div class="page-actions">
    {{if .TreeViewURL}}
    <a href="{{.TreeViewURL}}" class="btn-action btn-action-secondary">Tree</a>
    {{end}}
    <a href="/projects/{{.Project}}/pages/{{.ID}}/edit" class="btn-action">Edit</a>
    <a href="/projects/{{.Project}}/pages/{{.ID}}/history" class="btn-action">History</a>
    {{if or (eq .Status "draft") (eq .Status "review")}}
    <button class="btn-action btn-action-approve" onclick="if(confirm('Approve this page?')){fetch('/api/projects/{{.Project}}/pages/{{.ID}}/approve',{method:'POST'}).then(()=>location.reload())}">Approve</button>
    {{end}}
    {{if ne .Status "deprecated"}}
    <button class="btn-action btn-action-deprecate" onclick="if(confirm('Deprecate this page?')){fetch('/api/projects/{{.Project}}/pages/{{.ID}}/deprecate',{method:'POST'}).then(()=>location.reload())}">Deprecate</button>
    {{else}}
    <button class="btn-action btn-action-restore" onclick="if(confirm('Restore this page?')){fetch('/api/projects/{{.Project}}/pages/{{.ID}}/restore',{method:'POST'}).then(()=>location.reload())}">Restore</button>
    {{end}}
</div>
{{end}}
