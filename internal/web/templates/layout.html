{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — prd2wiki</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/tree.css">
    <link rel="stylesheet" href="/static/css/table.css">
    <link rel="stylesheet" href="/static/css/editor.css">
</head>
<body>
    <nav class="wiki-nav">
        <a href="/" class="logo">prd2wiki</a>
        <div class="nav-links">
            {{if .Project}}
            <a href="/projects/{{.Project}}/pages">Pages</a>
            <a href="/projects/{{.Project}}/pages/new">New Page</a>
            <a href="/projects/{{.Project}}/search">Search</a>
            {{else}}
            <a href="/">Projects</a>
            {{end}}
        </div>
    </nav>
    <main class="wiki-main">
        {{template "content" .}}
    </main>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        import elkLayouts from 'https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0/dist/mermaid-layout-elk.esm.min.mjs';
        mermaid.registerLayoutLoaders(elkLayouts);
        // Goldmark renders ```mermaid as <pre><code class="language-mermaid">
        // Mermaid.js expects <pre class="mermaid"> or <div class="mermaid">
        // Convert before mermaid.initialize runs.
        document.querySelectorAll('code.language-mermaid').forEach(code => {
            const pre = code.parentElement;
            const div = document.createElement('pre');
            div.className = 'mermaid';
            div.textContent = code.textContent;
            pre.replaceWith(div);
        });
        mermaid.initialize({ startOnLoad: true, theme: 'neutral', layout: 'elk' });
    </script>
</body>
</html>
{{end}}
