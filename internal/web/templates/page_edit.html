{{define "content"}}
{{$page := .Content}}

<h1>{{if $page.IsNew}}New Page{{else}}Edit: {{$page.Title}}{{end}}</h1>
{{if not $page.IsNew}}
<p class="page-url-aliases edit-url-hint" aria-label="Page URLs">
    {{if $page.WikiURL}}
    <span class="url-alias"><span class="url-alias-label">wiki</span> <a href="{{$page.WikiURL}}" class="url-alias-link">{{$page.WikiURL}}</a></span>
    {{end}}
    <span class="url-alias"><span class="url-alias-label">project</span> <a href="/projects/{{$.Project}}/pages/{{$page.ID}}" class="url-alias-link">/projects/{{$.Project}}/pages/{{$page.ID}}</a></span>
</p>
{{end}}

<form id="page-form" class="page-form" data-project="{{$.Project}}">
    <div class="form-group">
        <label for="field-id">ID</label>
        <input type="text" id="field-id" name="id" value="{{$page.ID}}" {{if not $page.IsNew}}readonly{{end}} required>
    </div>

    <div class="form-group">
        <label for="field-title">Title</label>
        <input type="text" id="field-title" name="title" value="{{$page.Title}}" required>
    </div>

    <div class="form-group">
        <label for="field-type">Type</label>
        <select id="field-type" name="type">
            <option value="" {{if eq $page.Type ""}}selected{{end}}>(unclassified)</option>
            <option value="research" {{if eq $page.Type "research"}}selected{{end}}>research</option>
            <option value="spec" {{if eq $page.Type "spec"}}selected{{end}}>spec</option>
            <option value="plan" {{if eq $page.Type "plan"}}selected{{end}}>plan</option>
            <option value="report" {{if eq $page.Type "report"}}selected{{end}}>report</option>
            <option value="review" {{if eq $page.Type "review"}}selected{{end}}>review</option>
            <option value="reference" {{if eq $page.Type "reference"}}selected{{end}}>reference</option>
            <option value="tracking" {{if eq $page.Type "tracking"}}selected{{end}}>tracking</option>
            <option value="skill" {{if eq $page.Type "skill"}}selected{{end}}>skill</option>
            <option value="rule" {{if eq $page.Type "rule"}}selected{{end}}>rule</option>
            <option value="project" {{if eq $page.Type "project"}}selected{{end}}>project</option>
        </select>
    </div>

    <div class="form-group">
        <label for="field-status">Status</label>
        <select id="field-status" name="status">
            <option value="draft" {{if eq $page.Status "draft"}}selected{{end}}>draft</option>
            <option value="submitted" {{if eq $page.Status "submitted"}}selected{{end}}>submitted</option>
            <option value="approved" {{if eq $page.Status "approved"}}selected{{end}}>approved</option>
            <option value="rejected" {{if eq $page.Status "rejected"}}selected{{end}}>rejected</option>
            <option value="implemented" {{if eq $page.Status "implemented"}}selected{{end}}>implemented</option>
            <option value="completed" {{if eq $page.Status "completed"}}selected{{end}}>completed</option>
            <option value="superseded" {{if eq $page.Status "superseded"}}selected{{end}}>superseded</option>
            <option value="retired" {{if eq $page.Status "retired"}}selected{{end}}>retired</option>
        </select>
    </div>

    <div class="form-group">
        <label for="field-tags">Tags (comma-separated)</label>
        <input type="text" id="field-tags" name="tags" value="{{$page.TagsCSV}}">
    </div>

    <div class="form-group">
        <label>Body (Markdown)</label>
        <div id="milkdown-editor" class="editor-container" style="display:none;"></div>
        <textarea id="editor-fallback" class="editor-fallback" rows="20">{{$page.Body}}</textarea>
    </div>

    <div class="form-actions">
        <button type="button" class="btn btn-submit" data-intent="verbatim">Do Not Mutate</button>
        <button type="button" class="btn btn-submit btn-primary" data-intent="conform">Correct &amp; Format</button>
        <button type="button" class="btn btn-submit btn-accent" data-intent="integrate">Reason &amp; Merge</button>
    </div>
</form>

<div id="results-area" class="results-area" style="display:none;">
    <h2>Results</h2>
    <div id="results-content"></div>
</div>

<link rel="stylesheet" href="/static/dist/editor.css">
<script src="/static/dist/editor.iife.js"></script>
<script type="module" src="/static/wiki.js"></script>
{{end}}
